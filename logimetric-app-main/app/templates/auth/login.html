{% extends 'auth/base_auth.html' %}
{% block title %}Accedi — LogiMetric{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Accedi</h1>
  <p class="auth-subtitle">Inserisci le tue credenziali per continuare.</p>

  <form method="post" action="{{ url_for('auth.login_post') }}" class="auth-form">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" class="input"
             value="{{ email|default('') }}" autocomplete="email" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" class="input"
             autocomplete="current-password" required>
    </div>
    <div class="field-row">
      <label class="checkbox-label">
        <input type="checkbox" name="remember"> Ricordami
      </label>
      <a href="{{ url_for('auth.forgot_password') }}" class="link-muted">Password dimenticata?</a>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Accedi</button>
  </form>

  <p class="auth-switch">
    Non hai un account? <a href="{{ url_for('auth.register') }}">Registrati</a>
  </p>
</div>
{% endblock %}

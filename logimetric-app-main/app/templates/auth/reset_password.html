{% extends 'auth/base_auth.html' %}
{% block title %}Reimposta password — LogiMetric{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Nuova password</h1>
  <p class="auth-subtitle">Scegli una password sicura di almeno 8 caratteri.</p>

  <form method="post" action="{{ url_for('auth.reset_password_post', token=token) }}" class="auth-form">
    <div class="field">
      <label for="password">Nuova password</label>
      <input id="password" type="password" name="password" class="input"
             autocomplete="new-password" minlength="8" required autofocus>
    </div>
    <div class="field">
      <label for="password2">Conferma password</label>
      <input id="password2" type="password" name="password2" class="input"
             autocomplete="new-password" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Reimposta password</button>
  </form>
</div>
{% endblock %}

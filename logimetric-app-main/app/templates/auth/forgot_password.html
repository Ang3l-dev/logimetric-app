{% extends 'auth/base_auth.html' %}
{% block title %}Password dimenticata — LogiMetric{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Password dimenticata</h1>
  <p class="auth-subtitle">Inserisci la tua email: ti invieremo un link per reimpostare la password.</p>

  <form method="post" action="{{ url_for('auth.forgot_password_post') }}" class="auth-form">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" class="input"
             autocomplete="email" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Invia link di reset</button>
  </form>

  <p class="auth-switch">
    <a href="{{ url_for('auth.login') }}">← Torna al login</a>
  </p>
</div>
{% endblock %}

{% extends 'auth/base_auth.html' %}
{% block title %}Registrati — LogiMetric{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="auth-title">Crea account</h1>
  <p class="auth-subtitle">La registrazione è gratuita. L'accesso sarà attivo dopo l'approvazione dell'amministratore.</p>

  <form method="post" action="{{ url_for('auth.register_post') }}" class="auth-form">
    <div class="field">
      <label for="name">Nome e cognome</label>
      <input id="name" type="text" name="name" class="input"
             value="{{ name|default('') }}" autocomplete="name" required autofocus>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" class="input"
             value="{{ email|default('') }}" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="password">Password <span class="label-hint">(min. 8 caratteri)</span></label>
      <input id="password" type="password" name="password" class="input"
             autocomplete="new-password" minlength="8" required>
    </div>
    <div class="field">
      <label for="password2">Conferma password</label>
      <input id="password2" type="password" name="password2" class="input"
             autocomplete="new-password" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Registrati</button>
  </form>

  <p class="auth-switch">
    Hai già un account? <a href="{{ url_for('auth.login') }}">Accedi</a>
  </p>
</div>
{% endblock %}
